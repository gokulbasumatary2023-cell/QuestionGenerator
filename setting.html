<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="bg-light">

<div class="container py-5">

<div class="card shadow-lg">

<div class="card-header bg-primary text-white">
<h3><i class="fa-solid fa-school"></i> School Settings</h3>
</div>

<div class="card-body">

<form id="settingsForm">

<div class="row">

<div class="col-md-6 mb-3">
<label>School Name</label>
<input type="text" class="form-control" id="schoolName">
</div>

<div class="col-md-6 mb-3">
<label>School Logo</label>
<input type="file" class="form-control" id="schoolLogo">
</div>

<div class="col-md-12 mb-3">
<label>School Address</label>
<textarea class="form-control" id="schoolAddress"></textarea>
</div>

<div class="col-md-6 mb-3">
<label>Phone</label>
<input type="text" class="form-control" id="phone">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" class="form-control" id="email">
</div>

<div class="col-md-6 mb-3">
<label>Website</label>
<input type="text" class="form-control" id="website">
</div>

<div class="col-md-6 mb-3">
<label>Principal Name</label>
<input type="text" class="form-control" id="principal">
</div>

<div class="col-md-12 mb-3">
<label>Exam Header</label>
<input type="text" class="form-control" id="examHeader">
</div>

<div class="text-center mt-4">
<button class="btn btn-success btn-lg" id="saveSettings">
<i class="fa-solid fa-floppy-disk"></i>
Save Settings
</button>
</div>

</div>

</form>

</div>

</div>

</div>

<script type="module" src="js/settings.js"></script>

</body>
</html>
