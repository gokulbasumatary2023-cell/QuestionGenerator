<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Preview</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/print.css">
</head>

<body>

<div class="container my-5" id="paper">

    <div class="text-center">
        <h2 id="schoolName">IRVINE ADVENTIST ENGLISH SCHOOL</h2>
        <p id="schoolAddress">Basbari, Baksa, Assam</p>

        <h4 id="examName">HALF YEARLY EXAMINATION - 2026</h4>

        <hr>
    </div>

    <div class="row mb-3">

        <div class="col-6">
            <strong>Class:</strong> <span id="className">V</span>
        </div>

        <div class="col-6 text-end">
            <strong>Subject:</strong> <span id="subjectName">Computer</span>
        </div>

        <div class="col-6">
            <strong>Time:</strong> <span id="time">2 Hours</span>
        </div>

        <div class="col-6 text-end">
            <strong>Marks:</strong> <span id="marks">50</span>
        </div>

    </div>

    <hr>

    <h5>Instructions</h5>

    <ol>
        <li>Answer all questions.</li>
        <li>Write neatly.</li>
        <li>Read all questions carefully.</li>
    </ol>

    <hr>

    <div id="questionContainer">

        <!-- Questions will load here -->

    </div>

    <div class="text-center mt-5">

        <button class="btn btn-primary" onclick="window.print()">
            Print
        </button>

        <button class="btn btn-danger" id="downloadPdf">
            Download PDF
        </button>

    </div>

</div>

<script type="module" src="js/paper-preview.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
document.getElementById("downloadPdf").addEventListener("click", function(){

    const element = document.getElementById("paper");

    html2pdf().from(element).save("QuestionPaper.pdf");

});
</script>
</body>
</html>
