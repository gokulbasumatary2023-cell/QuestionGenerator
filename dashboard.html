<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - QuestionGenerator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>QuestionGenerator</h3>

        <a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="add-question.html"><i class="fa fa-plus"></i> Add Question</a>
        <a href="question-bank.html"><i class="fa fa-book"></i> Question Bank</a>
        <a href="generate-paper.html"><i class="fa fa-file"></i> Generate Paper</a>
        <a href="saved-papers.html"><i class="fa fa-folder"></i> Saved Papers</a>
        <a href="settings.html"><i class="fa fa-gear"></i> Settings</a>
    </div>

    <!-- Main Content -->
    <div class="content container-fluid">

        <h2 class="mt-4">Dashboard</h2>

        <div class="row mt-4">

            <div class="col-md-3">
                <div class="card p-3 shadow">
                    <h5>Total Questions</h5>
                    <h2>0</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3 shadow">
                    <h5>Total Papers</h5>
                    <h2>0</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3 shadow">
                    <h5>Subjects</h5>
                    <h2>0</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3 shadow">
                    <h5>Users</h5>
                    <h2>1</h2>
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
