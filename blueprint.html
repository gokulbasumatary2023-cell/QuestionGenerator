<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint - QuestionGenerator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="bg-light">

<div class="container py-5">

<div class="card shadow-lg p-4">

<h2 class="text-center mb-4">
<i class="fa-solid fa-table-list"></i>
Question Paper Blueprint
</h2>

<form>

<div class="row">

<div class="col-md-4 mb-3">
<label class="form-label">Class</label>
<select class="form-select" id="class">
<option>Class I</option>
<option>Class II</option>
<option>Class III</option>
<option>Class IV</option>
<option>Class V</option>
<option>Class VI</option>
<option>Class VII</option>
<option>Class VIII</option>
<option>Class IX</option>
<option>Class X</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label class="form-label">Subject</label>
<input type="text" id="subject" class="form-control" placeholder="Subject">
</div>

<div class="col-md-4 mb-3">
<label class="form-label">Exam</label>
<select class="form-select" id="exam">
<option>Unit Test</option>
<option>Monthly Test</option>
<option>Half Yearly</option>
<option>Annual Examination</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label class="form-label">Total Marks</label>
<input type="number" id="marks" class="form-control" value="50">
</div>

<div class="col-md-4 mb-3">
<label class="form-label">Time</label>
<input type="text" id="time" class="form-control" placeholder="2 Hours">
</div>

<div class="col-md-4 mb-3">
<label class="form-label">Board</label>
<select class="form-select" id="board">
<option>SEBA</option>
<option>CBSE</option>
<option>ICSE</option>
<option>State Board</option>
</select>
</div>

<hr class="my-4">

<h4>Question Distribution</h4>

<div class="col-md-4 mb-3">
<label>MCQ (1 Mark)</label>
<input type="number" class="form-control" id="mcq" value="10">
</div>

<div class="col-md-4 mb-3">
<label>Fill in the Blanks</label>
<input type="number" class="form-control" id="fill">
</div>

<div class="col-md-4 mb-3">
<label>True / False</label>
<input type="number" class="form-control" id="tf">
</div>

<div class="col-md-6 mb-3">
<label>Short Answer</label>
<input type="number" class="form-control" id="short">
</div>

<div class="col-md-6 mb-3">
<label>Long Answer</label>
<input type="number" class="form-control" id="long">
</div>

<hr class="my-4">

<h4>Difficulty Distribution (%)</h4>

<div class="col-md-4 mb-3">
<label>Easy</label>
<input type="number" class="form-control" id="easy" value="40">
</div>

<div class="col-md-4 mb-3">
<label>Medium</label>
<input type="number" class="form-control" id="medium" value="40">
</div>

<div class="col-md-4 mb-3">
<label>Hard</label>
<input type="number" class="form-control" id="hard" value="20">
</div>

<div class="text-center mt-4">

<button id="saveBlueprint" class="btn btn-primary btn-lg">
    <i class="fa-solid fa-floppy-disk"></i>
    Save Blueprint
</button>

<button type="button" class="btn btn-success btn-lg">
<i class="fa-solid fa-bolt"></i>
Generate Paper
</button>

</div>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/blueprint.js"></script>
</body>
</html>
